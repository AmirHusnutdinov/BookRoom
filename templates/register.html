{% extends "base.html" %}
{% block title %}Регистрация{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <h2>Регистрация</h2>
        <form method="POST" class="form">
            <div class="form-group">
                <label for="username">Имя пользователя</label>
                <input type="text" id="username" name="username" required autofocus minlength="3">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" name="password" required minlength="6">
            </div>
            <div class="form-group">
                <label for="confirm_password">Подтверждение пароля</label>
                <input type="password" id="confirm_password" name="confirm_password" required minlength="6">
            </div>
            <div class="form-group form-group-admin">
                <label for="admin_code">🔑 Код администратора <span class="hint">(необязательно)</span></label>
                <input type="password" id="admin_code" name="admin_code" placeholder="Введите секретный код для роли админа">
                <small class="form-hint">Знаете код — станете администратором</small>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Зарегистрироваться</button>
        </form>
        <p class="auth-link">Уже есть аккаунт? <a href="{{ url_for('login') }}">Войти</a></p>
    </div>
</div>
{% endblock %}
